name: EAS Build

# Auto-builds on every push to master, and can also be run manually
# from the Actions tab (Run workflow button) with custom options.
on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options:
          - android
          - ios
          - all
        default: android
      profile:
        description: Build profile (see eas.json)
        type: choice
        options:
          - preview
          - production
          - development
        default: preview

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    # EXPO_TOKEN is stored as an environment secret on the "production"
    # environment, so the job must opt into that environment to read it.
    environment: production
    # On push events there are no inputs, so fall back to android/preview.
    env:
      PLATFORM: ${{ github.event.inputs.platform || 'android' }}
      PROFILE: ${{ github.event.inputs.profile || 'preview' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Link EAS project
        # Links to the existing glitchfy/fitness-club project (owner + slug are
        # set in app.json). Idempotent across runs.
        run: eas init --non-interactive

      - name: Build on EAS
        # --no-wait queues the build and returns immediately with a build URL;
        # track progress at https://expo.dev/accounts/glitchfy/projects/fitness-club/builds
        run: eas build --platform "$PLATFORM" --profile "$PROFILE" --non-interactive --no-wait

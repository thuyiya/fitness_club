name: EAS Build

# Trigger manually from the Actions tab (Run workflow button).
on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options:
          - android
          - ios
          - all
        default: android
      profile:
        description: Build profile (see eas.json)
        type: choice
        options:
          - preview
          - production
          - development
        default: preview

jobs:
  build:
    name: Build ${{ inputs.platform }} (${{ inputs.profile }})
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      - name: Link EAS project
        # Creates/links the project on the token's Expo account and writes the
        # projectId into app.json for this run. Idempotent on later runs.
        run: eas init --non-interactive

      - name: Build on EAS
        # --no-wait queues the build and returns immediately with a build URL;
        # watch progress at https://expo.dev.
        run: eas build --platform ${{ inputs.platform }} --profile ${{ inputs.profile }} --non-interactive --no-wait

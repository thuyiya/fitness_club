name: EAS Build

# Every push to master builds the production Android App Bundle and
# auto-submits it to the Google Play "internal" testing track.
# Can also be run manually from the Actions tab with custom options.
on:
  push:
    branches:
      - master
    # Don't burn a build on changes that don't affect the app bundle.
    paths-ignore:
      - 'scripts/**'
      - 'docs/**'
      - '**.md'
      - '.github/**'
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        options:
          - android
          - ios
          - all
        default: android
      profile:
        description: Build profile (see eas.json)
        type: choice
        options:
          - preview
          - production
          - development
        default: production

jobs:
  build:
    name: EAS Build
    runs-on: ubuntu-latest
    # EXPO_TOKEN is stored as an environment secret on the "production"
    # environment, so the job must opt into that environment to read it.
    environment: production
    # On push events there are no inputs, so fall back to android/production.
    env:
      PLATFORM: ${{ github.event.inputs.platform || 'android' }}
      PROFILE: ${{ github.event.inputs.profile || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci

      # Only production builds get auto-submitted to Play (submit profile
      # "production" in eas.json -> internal track). preview/development
      # builds just queue and produce a shareable artifact.
      - name: Set submit flag
        run: |
          if [ "$PROFILE" = "production" ]; then
            echo "SUBMIT_FLAG=--auto-submit" >> "$GITHUB_ENV"
          else
            echo "SUBMIT_FLAG=" >> "$GITHUB_ENV"
          fi

      - name: Build on EAS
        # --auto-submit queues the Play Store submission on EAS servers once
        # the build finishes, so --no-wait can return immediately.
        # Track progress at https://expo.dev/accounts/glitchfy/projects/fitness-club/builds
        run: eas build --platform "$PLATFORM" --profile "$PROFILE" --non-interactive --no-wait $SUBMIT_FLAG
